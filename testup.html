<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="shortcut icon" href="logo.jpg" type="image/x-icon">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHYSICS 23 — CT Tracker</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#06060d;--border:#1a1a32;--border2:#26264a;--border3:#3a3a60;
      --text:#eaeaf8;--text2:#7878a8;--text3:#50507a;
      --accent:#7c6af7;--accent2:#a898ff;--blue:#4f8ef7;--green:#3ecf8e;--amber:#f7c44f;--red:#f74f6a;
      --glass:rgba(255,255,255,0.025);
      --radius:14px;--radius-sm:9px;--radius-xs:6px;
      --shadow:0 4px 24px rgba(0,0,0,0.5);
    }
    html{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden}

    #physics-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
    .bg-grid{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(124,106,247,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(124,106,247,0.025) 1px,transparent 1px);background-size:80px 80px}

    body{max-width:1280px;margin:0 auto;padding:2rem 1.5rem 5rem;position:relative;z-index:10}

    .header{text-align:center;padding:4rem 1rem 3rem;position:relative}
    .header-glow{position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:700px;height:400px;background:radial-gradient(ellipse at center,rgba(124,106,247,0.22) 0%,rgba(79,142,247,0.1) 45%,transparent 70%);pointer-events:none;filter:blur(30px);animation:glowPulse 5s ease-in-out infinite alternate}
    @keyframes glowPulse{0%{opacity:0.5;transform:translateX(-50%) scale(0.95)}100%{opacity:1;transform:translateX(-50%) scale(1.05)}}
    .header h1{font-size:clamp(2.6rem,6vw,4.2rem);font-weight:900;letter-spacing:-0.04em;background:linear-gradient(135deg,#fff 10%,#d0c8ff 40%,#7c6af7 70%,#4f8ef7 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 30px rgba(124,106,247,0.35))}
    .header-sub{color:var(--text3);font-size:0.75rem;letter-spacing:0.28em;text-transform:uppercase;margin-top:0.6rem;font-weight:600}
    .header-line{width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),var(--blue),transparent);margin:1.5rem auto 0;border-radius:2px;animation:lineShimmer 3s ease-in-out infinite alternate}
    @keyframes lineShimmer{0%{width:50px;opacity:0.4}100%{width:120px;opacity:1}}

    .status-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem;background:rgba(8,8,18,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:0.65rem 1.2rem;margin-bottom:1.8rem;font-size:0.76rem;color:var(--text2)}
    .sdot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-right:7px;box-shadow:0 0 6px rgba(62,207,142,0.7);animation:sdotPulse 2s infinite}
    .sdot.err{background:var(--red);animation:none;box-shadow:0 0 8px rgba(247,79,106,0.8)}
    .sdot.loading{background:var(--amber);box-shadow:0 0 6px rgba(247,196,79,0.7);animation:sdotPulse 0.85s infinite}
    @keyframes sdotPulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(62,207,142,0.5)}50%{opacity:0.6;box-shadow:0 0 0 5px rgba(62,207,142,0)}}

    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2.2rem}
    @media(max-width:640px){.stats{grid-template-columns:repeat(2,1fr)}}
    .stat-card{background:rgba(8,8,18,0.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border2);border-radius:var(--radius);padding:1.5rem 1rem;text-align:center;transition:border-color 0.3s,transform 0.35s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.3s;cursor:default;position:relative;overflow:hidden}
    .stat-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.04) 0%,transparent 60%);pointer-events:none}
    .stat-card:hover{border-color:var(--border3);transform:translateY(-5px) scale(1.02);box-shadow:0 20px 50px rgba(0,0,0,0.5),0 0 0 1px rgba(124,106,247,0.2)}
    .stat-num{font-size:2.6rem;font-weight:900;line-height:1;margin-bottom:0.5rem;font-variant-numeric:tabular-nums;letter-spacing:-0.02em}
    .stat-label{font-size:0.65rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--text3)}
    .sn-purple{color:var(--accent2);text-shadow:0 0 20px rgba(124,106,247,0.5)}
    .sn-blue{color:var(--blue);text-shadow:0 0 20px rgba(79,142,247,0.5)}
    .sn-green{color:var(--green);text-shadow:0 0 20px rgba(62,207,142,0.5)}
    .sn-amber{color:var(--amber);text-shadow:0 0 20px rgba(247,196,79,0.5)}

    .section-title{font-size:0.68rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--text3);margin-bottom:1.1rem;display:flex;align-items:center;gap:10px}
    .section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}

    .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.1rem;margin-bottom:2.8rem}
    .card{background:rgba(8,8,18,0.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:var(--radius);padding:1.3rem 1.4rem;transition:border-color 0.3s,transform 0.4s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.3s,opacity 0.3s;position:relative;overflow:hidden;animation:fadeSlideUp 0.5s ease both}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;background:linear-gradient(90deg,transparent,var(--accent),var(--blue),transparent);opacity:0;transition:opacity 0.3s}
    .card::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top left,rgba(124,106,247,0.07) 0%,transparent 60%);pointer-events:none;opacity:0;transition:opacity 0.4s}
    .card:hover{border-color:var(--border3);transform:translateY(-6px) scale(1.015);box-shadow:0 20px 60px rgba(0,0,0,0.5),0 0 0 1px rgba(124,106,247,0.18),0 0 40px rgba(124,106,247,0.1)}
    .card:hover::before{opacity:1}.card:hover::after{opacity:1}
    .card.card-done{opacity:0.6;border-color:rgba(62,207,142,0.15)}.card.card-done::before{background:linear-gradient(90deg,transparent,var(--green),transparent);opacity:0.5}.card.card-done:hover{opacity:0.82}
    .card-done .card-title{text-decoration:line-through;text-decoration-color:rgba(62,207,142,0.4)}
    .card-type{font-size:0.65rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 9px;border-radius:5px;display:inline-block;margin-bottom:0.8rem}
    .tc{background:rgba(124,106,247,0.15);color:#b8aeff;border:1px solid rgba(124,106,247,0.28)}.th{background:rgba(79,142,247,0.15);color:#7ab4ff;border:1px solid rgba(79,142,247,0.28)}.tq{background:rgba(247,196,79,0.15);color:#fdd87a;border:1px solid rgba(247,196,79,0.28)}.te{background:rgba(247,79,106,0.15);color:#ff9aaa;border:1px solid rgba(247,79,106,0.28)}.to{background:rgba(144,144,176,0.12);color:var(--text2);border:1px solid rgba(144,144,176,0.2)}
    .card-title{font-size:1rem;font-weight:650;margin-bottom:0.35rem;line-height:1.35;color:var(--text)}
    .card-meta{font-size:0.76rem;color:var(--text2);margin-bottom:0.25rem;display:flex;align-items:center;gap:5px}
    .card-teacher{font-size:0.76rem;color:var(--text2);margin-bottom:0.75rem}
    .card-date{font-size:0.78rem;color:var(--text2);margin-bottom:0.7rem;display:flex;align-items:center;gap:6px}
    .countdown{background:rgba(124,106,247,0.08);border:1px solid rgba(124,106,247,0.2);border-radius:var(--radius-sm);padding:0.55rem 0.8rem;font-family:ui-monospace,'JetBrains Mono',monospace;font-size:0.81rem;color:var(--accent2);letter-spacing:0.06em;margin-bottom:0.8rem;display:flex;align-items:center;gap:7px}
    .countdown.cd-urgent{background:rgba(247,79,106,0.12);border-color:rgba(247,79,106,0.35);color:#ff8a9a;animation:urgentPulse 1.5s ease-in-out infinite}
    .countdown.cd-done{background:rgba(62,207,142,0.08);border-color:rgba(62,207,142,0.2);color:#4fd17a}
    @keyframes urgentPulse{0%,100%{box-shadow:0 0 0 0 rgba(247,79,106,0.25)}50%{box-shadow:0 0 0 7px rgba(247,79,106,0)}}
    .done-label{display:inline-flex;align-items:center;gap:5px;background:rgba(62,207,142,0.1);border:1px solid rgba(62,207,142,0.25);color:var(--green);font-size:0.68rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 9px;border-radius:5px;margin-bottom:0.7rem}
    .btn-view{display:inline-flex;align-items:center;gap:5px;background:rgba(79,142,247,0.08);border:1px solid rgba(79,142,247,0.22);color:#7ab4ff;font-size:0.74rem;font-weight:600;padding:5px 12px;border-radius:var(--radius-xs);text-decoration:none;cursor:pointer;transition:background 0.2s,border-color 0.2s,transform 0.2s,box-shadow 0.2s}
    .btn-view:hover{background:rgba(79,142,247,0.2);border-color:rgba(79,142,247,0.45);transform:translateY(-2px) scale(1.03);box-shadow:0 6px 18px rgba(79,142,247,0.22)}.btn-view:active{transform:scale(0.96)}
    .empty-state{text-align:center;color:var(--text2);font-size:0.88rem;padding:2.5rem;background:var(--glass);border:1px dashed var(--border2);border-radius:var(--radius);margin-bottom:2rem}

    .table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border2);margin-bottom:2.8rem;background:rgba(6,6,14,0.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);box-shadow:var(--shadow)}
    table{width:100%;border-collapse:collapse;font-size:0.81rem;min-width:760px}
    thead tr{background:rgba(12,12,24,0.98)}
    th{padding:0.85rem 1rem;text-align:left;font-size:0.65rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border2);white-space:nowrap}
    td{padding:0.8rem 1rem;border-bottom:1px solid rgba(26,26,50,0.8);color:var(--text);vertical-align:middle}
    tbody tr:last-child td{border-bottom:none}
    tbody tr{transition:background 0.2s;animation:fadeSlideUp 0.3s ease both}
    tbody tr:hover td{background:rgba(124,106,247,0.06)}
    tbody tr.tr-done td{color:var(--text2)}.tbody tr.tr-done .badge-title{text-decoration:line-through;text-decoration-color:rgba(100,100,150,0.4)}
    .group-row td{padding:0.42rem 1rem;background:rgba(12,12,24,0.98)!important;font-size:0.62rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;border-bottom:1px solid var(--border2)!important;border-top:2px solid var(--border2)}
    .group-row.g-upcoming td{color:rgba(79,142,247,0.85)}.group-row.g-tbd td{color:rgba(247,196,79,0.75)}.group-row.g-done td{color:rgba(62,207,142,0.65)}
    .badge{font-size:0.64rem;font-weight:700;letter-spacing:0.08em;padding:3px 8px;border-radius:5px;text-transform:uppercase;white-space:nowrap}
    .sd{background:rgba(62,207,142,0.12);color:#5ee8a0;border:1px solid rgba(62,207,142,0.22)}.su{background:rgba(124,106,247,0.12);color:#b0a4ff;border:1px solid rgba(124,106,247,0.22)}.sp{background:rgba(247,196,79,0.12);color:#fdd87a;border:1px solid rgba(247,196,79,0.22)}.sx{background:rgba(144,144,176,0.1);color:var(--text2);border:1px solid rgba(144,144,176,0.15)}
    .date-empty{color:var(--text3);font-style:italic;font-size:0.75rem}

    .filters{display:flex;gap:0.45rem;flex-wrap:wrap;margin-bottom:1.1rem;align-items:center}
    .filter-btn{background:var(--glass);border:1px solid var(--border2);color:var(--text2);font-size:0.72rem;font-weight:600;padding:5px 14px;border-radius:20px;cursor:pointer;transition:all 0.25s}
    .filter-btn:hover,.filter-btn.active{background:rgba(124,106,247,0.15);border-color:rgba(124,106,247,0.42);color:var(--accent2);box-shadow:0 0 16px rgba(124,106,247,0.14);transform:translateY(-1px)}.filter-btn:active{transform:scale(0.95)}
    .search{background:rgba(8,8,18,0.8);border:1px solid var(--border2);color:var(--text);font-size:0.79rem;padding:6px 15px;border-radius:20px;outline:none;margin-left:auto;min-width:175px;transition:border-color 0.25s,box-shadow 0.25s}
    .search:focus{border-color:rgba(124,106,247,0.48);box-shadow:0 0 0 3px rgba(124,106,247,0.1)}.search::placeholder{color:var(--text3)}
    .err-box{background:rgba(247,79,106,0.07);border:1px solid rgba(247,79,106,0.22);border-radius:var(--radius-sm);padding:1rem 1.2rem;margin-bottom:1.3rem;color:#ff9aaa;font-size:0.81rem;line-height:1.6;display:none}
    .teacher-pill{display:inline-flex;align-items:center;gap:4px;background:rgba(62,207,142,0.07);border:1px solid rgba(62,207,142,0.15);color:#5ee8a0;font-size:0.67rem;font-weight:600;padding:2px 8px;border-radius:20px}
    .spinner{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeSlideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @media(max-width:600px){body{padding:1rem 0.75rem 3rem}.header{padding:2.5rem 0.5rem 2rem}.filters{gap:0.35rem}.search{margin-left:0;width:100%}}
  </style>
</head>
<body>

<canvas id="physics-canvas"></canvas>
<div class="bg-grid"></div>

<div class="header">
  <div class="header-glow"></div>
  <h1>PHYSICS 23</h1>
  <p class="header-sub">CT Tracker</p>
  <div class="header-line"></div>
</div>

<div class="status-bar">
  <span><span class="sdot loading" id="sdot"></span><span id="stxt">Connecting…</span></span>
  <span id="lupd" style="font-size:0.73rem"></span>
</div>

<div class="stats">
  <div class="stat-card"><div class="stat-num sn-purple" id="s-total">—</div><div class="stat-label">Total</div></div>
  <div class="stat-card"><div class="stat-num sn-blue" id="s-upcoming">—</div><div class="stat-label">Upcoming</div></div>
  <div class="stat-card"><div class="stat-num sn-green" id="s-done">—</div><div class="stat-label">Done</div></div>
  <div class="stat-card"><div class="stat-num sn-amber" id="s-week">—</div><div class="stat-label">This Week</div></div>
</div>

<div class="err-box" id="errbox"></div>
<p class="section-title">Upcoming This Week</p>
<div id="upcoming"><div style="padding:2rem 0;color:var(--text2);font-size:0.85rem"><span class="spinner"></span>Loading…</div></div>
<p class="section-title">All Class Tests &amp; Activities</p>
<div class="filters" id="fbar">
  <button class="filter-btn active" data-f="all" onclick="setF('all')">All</button>
  <input type="text" class="search" placeholder="Search…" oninput="onSearch(this.value)">
</div>
<div class="table-wrap">
  <table>
    <thead><tr><th>Course</th><th>Section</th><th>Type</th><th>Title</th><th>Teacher</th><th>Date</th><th>Status</th><th>Material</th></tr></thead>
    <tbody id="tbody"><tr><td colspan="8" style="text-align:center;padding:3rem;color:var(--text2)"><span class="spinner"></span>Fetching data…</td></tr></tbody>
  </table>
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   PHYSICS BACKGROUND SIMULATION
   Scenes: atoms, sine waves, projectiles, pendulums,
           electric field lines, quantum particles, formulas
═══════════════════════════════════════════════════════════ */
(function PhysicsBG(){
  const cv=document.getElementById('physics-canvas');
  const cx=cv.getContext('2d');
  let W,H,T=0;

  /* colour helpers */
  const COLS={
    ac:[124,106,247],bl:[79,142,247],gr:[62,207,142],
    am:[247,196,79],rd:[247,79,106],wh:[255,255,255]
  };
  function rgba(key,a){const c=COLS[key];return`rgba(${c[0]},${c[1]},${c[2]},${a})`}

  /* ── state arrays ── */
  let atoms=[], particles=[], waves=[], fieldLines=[], projs=[], pendulums=[], formulas=[];

  function resize(){
    W=cv.width=window.innerWidth;
    H=cv.height=window.innerHeight;
    buildScene();
  }

  /* ══ ATOMS ══ */
  function buildAtoms(){
    atoms=[];
    const n=Math.max(4,Math.min(9,Math.floor(W/180)));
    const colKeys=Object.keys(COLS);
    for(let i=0;i<n;i++){
      const orbitCount=Math.floor(Math.random()*3)+1;
      const orbits=Array.from({length:orbitCount},(_,k)=>({
        r:35+k*30+Math.random()*20,
        tilt:Math.random()*Math.PI*0.65-0.32,
        speed:(0.0007+Math.random()*0.0009)*(Math.random()>0.5?1:-1),
        angle:Math.random()*Math.PI*2,
        eCount:Math.floor(Math.random()*2)+1,
      }));
      atoms.push({
        x:100+Math.random()*(W-200), y:100+Math.random()*(H-200),
        vx:(Math.random()-0.5)*0.12, vy:(Math.random()-0.5)*0.12,
        nR:4+Math.random()*4,
        col:colKeys[Math.floor(Math.random()*colKeys.length)],
        al:0.1+Math.random()*0.18,
        orbits,
      });
    }
  }

  function drawAtoms(){
    atoms.forEach(a=>{
      a.x+=a.vx; a.y+=a.vy;
      if(a.x<-150||a.x>W+150)a.vx*=-1;
      if(a.y<-150||a.y>H+150)a.vy*=-1;
      /* nucleus glow */
      const ng=cx.createRadialGradient(a.x,a.y,0,a.x,a.y,a.nR*4);
      ng.addColorStop(0,rgba(a.col,a.al*5)); ng.addColorStop(1,rgba(a.col,0));
      cx.beginPath();cx.arc(a.x,a.y,a.nR*4,0,Math.PI*2);cx.fillStyle=ng;cx.fill();
      /* nucleus */
      cx.beginPath();cx.arc(a.x,a.y,a.nR,0,Math.PI*2);cx.fillStyle=rgba(a.col,a.al*5);cx.fill();
      /* orbits + electrons */
      a.orbits.forEach(o=>{
        o.angle+=o.speed;
        cx.save();cx.translate(a.x,a.y);cx.rotate(o.tilt);
        cx.beginPath();cx.ellipse(0,0,o.r,o.r*0.38,0,0,Math.PI*2);
        cx.strokeStyle=rgba(a.col,a.al*0.55);cx.lineWidth=0.7;cx.stroke();
        for(let e=0;e<o.eCount;e++){
          const ea=o.angle+e*(Math.PI*2/o.eCount);
          const ex=Math.cos(ea)*o.r, ey=Math.sin(ea)*o.r*0.38;
          const eg=cx.createRadialGradient(ex,ey,0,ex,ey,7);
          eg.addColorStop(0,rgba(a.col,a.al*7));eg.addColorStop(1,rgba(a.col,0));
          cx.beginPath();cx.arc(ex,ey,7,0,Math.PI*2);cx.fillStyle=eg;cx.fill();
          cx.beginPath();cx.arc(ex,ey,2.2,0,Math.PI*2);cx.fillStyle=rgba(a.col,a.al*8);cx.fill();
        }
        cx.restore();
      });
    });
  }

  /* ══ SINE WAVES ══ */
  function buildWaves(){
    const colArr=['ac','bl','gr','am','wh'];
    waves=Array.from({length:5},(_,i)=>({
      baseY:H*(0.15+i*0.18), amp:15+Math.random()*50,
      freq:0.005+Math.random()*0.008,
      speed:0.0004+Math.random()*0.0006,
      phase:Math.random()*Math.PI*2,
      col:colArr[i%colArr.length],
      al:0.05+Math.random()*0.07,
      lw:0.7+Math.random()*0.6,
    }));
  }

  function drawWaves(){
    waves.forEach(w=>{
      w.phase+=w.speed;
      cx.beginPath();
      for(let x=0;x<=W;x+=5){
        const y=w.baseY+Math.sin(x*w.freq+w.phase)*w.amp
                       +Math.cos(x*w.freq*1.7+w.phase*0.8)*w.amp*0.25;
        x===0?cx.moveTo(x,y):cx.lineTo(x,y);
      }
      cx.strokeStyle=rgba(w.col,w.al);cx.lineWidth=w.lw;cx.stroke();
    });
  }

  /* ══ QUANTUM PARTICLES + CONNECTIONS ══ */
  function buildParticles(){
    const n=Math.min(70,Math.floor(W*H/14000));
    const colArr=['ac','bl','gr','am','wh'];
    particles=Array.from({length:n},()=>({
      x:Math.random()*W, y:Math.random()*H,
      vx:(Math.random()-0.5)*0.45, vy:(Math.random()-0.5)*0.45,
      r:1+Math.random()*2.5,
      col:colArr[Math.floor(Math.random()*colArr.length)],
      al:0.12+Math.random()*0.22,
      ph:Math.random()*Math.PI*2,
      ps:0.02+Math.random()*0.025,
      life:Math.random(), ld:Math.random()>0.5?1:-1,
    }));
  }

  function drawParticles(){
    /* connections first */
    for(let i=0;i<particles.length;i++){
      for(let j=i+1;j<particles.length;j++){
        const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y;
        const d=Math.hypot(dx,dy);
        if(d<110){
          cx.beginPath();cx.moveTo(particles[i].x,particles[i].y);cx.lineTo(particles[j].x,particles[j].y);
          cx.strokeStyle=rgba('ac',(1-d/110)*0.045);cx.lineWidth=0.35;cx.stroke();
        }
      }
    }
    /* dots */
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.ph+=p.ps;
      p.life+=p.ld*0.003;if(p.life>1||p.life<0)p.ld*=-1;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      const r=p.r*(0.8+Math.sin(p.ph)*0.3);
      const a=p.al*p.life;
      const g=cx.createRadialGradient(p.x,p.y,0,p.x,p.y,r*3);
      g.addColorStop(0,rgba(p.col,a*2.5));g.addColorStop(1,rgba(p.col,0));
      cx.beginPath();cx.arc(p.x,p.y,r*3,0,Math.PI*2);cx.fillStyle=g;cx.fill();
      cx.beginPath();cx.arc(p.x,p.y,r,0,Math.PI*2);cx.fillStyle=rgba(p.col,a*3.5);cx.fill();
    });
  }

  /* ══ ELECTRIC FIELD LINES ══ */
  function buildFieldLines(){
    fieldLines=[];
    /* place charges relative to screen */
    const charges=[
      {x:W*0.15,y:H*0.25,q:1,col:'ac'},
      {x:W*0.85,y:H*0.25,q:-1,col:'rd'},
      {x:W*0.5,y:H*0.8,q:1,col:'bl'},
    ];
    charges.forEach(ch=>{
      for(let k=0;k<10;k++){
        const ang=(Math.PI*2/10)*k;
        const pts=[];
        let px=ch.x+Math.cos(ang)*18, py=ch.y+Math.sin(ang)*18;
        for(let s=0;s<80;s++){
          pts.push({x:px,y:py});
          let fx=0,fy=0;
          charges.forEach(c2=>{
            const dx=px-c2.x,dy=py-c2.y,d2=dx*dx+dy*dy;
            if(d2<4)return;
            const f=c2.q*400/d2,mag=Math.sqrt(d2);
            fx+=f*dx/mag;fy+=f*dy/mag;
          });
          const m=Math.hypot(fx,fy)||1;
          px+=fx/m*7;py+=fy/m*7;
          if(px<-20||px>W+20||py<-20||py>H+20)break;
        }
        fieldLines.push({pts,col:ch.col,al:0.06+Math.random()*0.05});
      }
    });
  }

  function drawFieldLines(){
    fieldLines.forEach(fl=>{
      if(fl.pts.length<2)return;
      cx.beginPath();cx.moveTo(fl.pts[0].x,fl.pts[0].y);
      fl.pts.forEach(p=>cx.lineTo(p.x,p.y));
      cx.strokeStyle=rgba(fl.col,fl.al);cx.lineWidth=0.55;cx.stroke();
    });
  }

  /* ══ PROJECTILE MOTION ══ */
  function buildProjs(){
    projs=[];for(let i=0;i<5;i++)spawnProj();
  }

  function spawnProj(){
    const fromLeft=Math.random()>0.5;
    const ang=(18+Math.random()*45)*Math.PI/180;
    const spd=1.5+Math.random()*2;
    const colArr=['ac','bl','gr','am'];
    projs.push({
      x:fromLeft?-10:W+10, y:H*(0.35+Math.random()*0.35),
      vx:(fromLeft?1:-1)*Math.cos(ang)*spd,
      vy:-Math.sin(ang)*spd,
      g:0.035+Math.random()*0.025,
      r:2+Math.random()*2.5,
      col:colArr[Math.floor(Math.random()*colArr.length)],
      al:0.22+Math.random()*0.2,
      trail:[],
    });
  }

  function drawProjs(){
    for(let i=projs.length-1;i>=0;i--){
      const p=projs[i];
      p.trail.push({x:p.x,y:p.y});
      if(p.trail.length>55)p.trail.shift();
      p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;
      /* trail */
      for(let j=1;j<p.trail.length;j++){
        const pr=j/p.trail.length;
        cx.beginPath();cx.moveTo(p.trail[j-1].x,p.trail[j-1].y);cx.lineTo(p.trail[j].x,p.trail[j].y);
        cx.strokeStyle=rgba(p.col,p.al*pr*0.55);cx.lineWidth=p.r*pr;cx.stroke();
      }
      /* ball glow */
      const g=cx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*3.5);
      g.addColorStop(0,rgba(p.col,p.al*2.5));g.addColorStop(1,rgba(p.col,0));
      cx.beginPath();cx.arc(p.x,p.y,p.r*3.5,0,Math.PI*2);cx.fillStyle=g;cx.fill();
      cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fillStyle=rgba(p.col,p.al*3.5);cx.fill();

      if(p.x<-250||p.x>W+250||p.y>H+120){projs.splice(i,1);spawnProj();}
    }
  }

  /* ══ PENDULUMS ══ */
  function buildPendulums(){
    const colArr=['ac','bl','gr'];
    pendulums=Array.from({length:3},(_,i)=>({
      px:W*(0.2+i*0.3), py:H*0.03,
      len:60+Math.random()*100,
      angle:(Math.random()-0.5)*0.9,
      av:0,
      g_acc:0.0006+Math.random()*0.0003,
      damp:0.9994,
      col:colArr[i],
      al:0.13+Math.random()*0.1,
      bR:5+Math.random()*4,
    }));
  }

  function drawPendulums(){
    pendulums.forEach(p=>{
      p.av+=-p.g_acc*Math.sin(p.angle);
      p.av*=p.damp;
      p.angle+=p.av;
      if(Math.abs(p.av)<0.00015)p.av+=(Math.random()-0.5)*0.003;
      const bx=p.px+Math.sin(p.angle)*p.len, by=p.py+Math.cos(p.angle)*p.len;
      /* string */
      cx.beginPath();cx.moveTo(p.px,p.py);cx.lineTo(bx,by);
      cx.strokeStyle=rgba(p.col,p.al);cx.lineWidth=0.9;cx.stroke();
      /* pivot */
      cx.beginPath();cx.arc(p.px,p.py,2.5,0,Math.PI*2);cx.fillStyle=rgba(p.col,p.al*2.5);cx.fill();
      /* bob */
      const bg=cx.createRadialGradient(bx,by,0,bx,by,p.bR*3.5);
      bg.addColorStop(0,rgba(p.col,p.al*3.5));bg.addColorStop(1,rgba(p.col,0));
      cx.beginPath();cx.arc(bx,by,p.bR*3.5,0,Math.PI*2);cx.fillStyle=bg;cx.fill();
      cx.beginPath();cx.arc(bx,by,p.bR,0,Math.PI*2);cx.fillStyle=rgba(p.col,p.al*4.5);cx.fill();
    });
  }

  /* ══ PHYSICS FORMULA LABELS ══ */
  const FORMULAS=['E = mc²','F = ma','v = u + at','λν = c',
    'ΔxΔp ≥ ℏ/2','∇·E = ρ/ε₀','∮B·dl = μ₀I','p = mv',
    'W = Fd cosθ','KE = ½mv²','PV = nRT','τ = Iα'];

  function buildFormulas(){
    const colArr=['ac','bl','gr','am','wh'];
    formulas=FORMULAS.map(txt=>({
      txt, x:Math.random()*W, y:Math.random()*H,
      vx:(Math.random()-0.5)*0.1, vy:(Math.random()-0.5)*0.07,
      al:0.035+Math.random()*0.055,
      sz:12+Math.random()*9,
      col:colArr[Math.floor(Math.random()*colArr.length)],
    }));
  }

  function drawFormulas(){
    formulas.forEach(f=>{
      f.x+=f.vx;f.y+=f.vy;
      if(f.x<-120)f.x=W+60;if(f.x>W+120)f.x=-60;
      if(f.y<-20)f.y=H+10;if(f.y>H+20)f.y=-10;
      cx.font=`italic ${f.sz}px Georgia,serif`;
      cx.fillStyle=rgba(f.col,f.al);
      cx.fillText(f.txt,f.x,f.y);
    });
  }

  /* ══ BUILD ALL ══ */
  function buildScene(){
    buildAtoms();buildWaves();buildParticles();
    buildFieldLines();buildProjs();buildPendulums();buildFormulas();
  }

  /* ══ FRAME ══ */
  function frame(){
    cx.clearRect(0,0,W,H);
    T+=0.016;
    drawFieldLines();
    drawWaves();
    drawParticles();   /* includes connections */
    drawProjs();
    drawAtoms();
    drawPendulums();
    drawFormulas();
    requestAnimationFrame(frame);
  }

  window.addEventListener('resize',()=>{resize();});
  resize();
  frame();
})();

/* ═══════════════════════════════════════════════════════════
   APP LOGIC
═══════════════════════════════════════════════════════════ */
const SHEET='https://docs.google.com/spreadsheets/d/e/2PACX-1vSNw54kYiLKI2oL65tXLZqxdUwgc39ATSaNdAuVG1x0JqzNZcWZDdpfFA8lBPeitQVmtaiRiygvT7PS/pub?gid=54829023&single=true&output=csv';
const CACHE_KEY='ph23_data_v2';
const PROXIES=[u=>u,u=>'https://corsproxy.io/?'+encodeURIComponent(u),u=>'https://api.allorigins.win/raw?url='+encodeURIComponent(u),u=>'https://thingproxy.freeboard.io/fetch/'+u];
let allData=[],af='all',sq='',cdTimer=null;

function splitLine(l){const r=[];let c='',q=false;for(let i=0;i<l.length;i++){if(l[i]==='"'){q=!q}else if(l[i]===','&&!q){r.push(c);c='';}else c+=l[i];}r.push(c);return r.map(x=>x.replace(/^"|"$/g,'').trim());}
function parseCSV(txt){const lines=txt.trim().split(/\r?\n/);if(lines.length<2)return[];const h=splitLine(lines[0]).map(x=>x.trim());return lines.slice(1).map(l=>{const cols=splitLine(l),o={};h.forEach((k,i)=>{o[k]=(cols[i]||'').trim();});return o;}).filter(r=>Object.values(r).some(v=>v));}
function pd(s){if(!s||!s.trim())return null;const d=new Date(s);return isNaN(d)?null:d;}
function fd(s){const d=pd(s);return d?d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'}):null;}
function inWeek(s){const d=pd(s);if(!d)return false;const diff=d-new Date();return diff>=-86400000&&diff<=604800000;}
function getAutoStatus(row){const d=pd(row.Date);if(!d)return'tbd';const now=new Date();now.setHours(0,0,0,0);return d<now?'done':'upcoming';}
function sc(s){if(s==='done')return'sd';if(s==='upcoming')return'su';if(s==='tbd')return'sp';return'sx';}
function statusLabel(s){if(s==='done')return'Done';if(s==='upcoming')return'Upcoming';if(s==='tbd')return'TBD';return'—';}
function getCD(s){const d=pd(s);if(!d)return null;const diff=d-new Date();if(diff<=0)return null;const days=Math.floor(diff/86400000),hrs=Math.floor(diff%86400000/3600000),mins=Math.floor(diff%3600000/60000);if(days>0)return days+'d '+hrs+'h '+mins+'m';if(hrs>0)return hrs+'h '+mins+'m';return mins+'m';}
function isUrgent(s){const d=pd(s);if(!d)return false;const diff=d-new Date();return diff>0&&diff<86400000;}
function sortData(d){const upcoming=d.filter(r=>getAutoStatus(r)==='upcoming').sort((a,b)=>pd(a.Date)-pd(b.Date));const tbd=d.filter(r=>getAutoStatus(r)==='tbd');const done=d.filter(r=>getAutoStatus(r)==='done').sort((a,b)=>pd(b.Date)-pd(a.Date));return{upcoming,tbd,done};}
function tc(t){if(!t)return'to';const s=t.toLowerCase();if(s.includes('ct')||s.includes('class test'))return'tc';if(s.includes('hw')||s.includes('home'))return'th';if(s.includes('quiz'))return'tq';if(s.includes('exam')||s.includes('final'))return'te';return'to';}
function teacherPill(t){return t?`<span class="teacher-pill">◈ ${t}</span>`:''}

function updateStats(d){animNum('s-total',d.length);animNum('s-upcoming',d.filter(r=>getAutoStatus(r)==='upcoming').length);animNum('s-done',d.filter(r=>getAutoStatus(r)==='done').length);animNum('s-week',d.filter(r=>inWeek(r.Date)).length);}
function animNum(id,target){const el=document.getElementById(id);const cur=parseInt(el.textContent)||0;if(cur===target){el.textContent=target;return;}const step=Math.ceil(Math.abs(target-cur)/14);let val=cur;const iv=setInterval(()=>{val=val<target?Math.min(val+step,target):Math.max(val-step,target);el.textContent=val;if(val===target)clearInterval(iv);},35);}

function buildUpcoming(d){
  const el=document.getElementById('upcoming');
  const ev=d.filter(r=>inWeek(r.Date)).sort((a,b)=>new Date(a.Date)-new Date(b.Date));
  if(!ev.length){el.innerHTML='<div class="empty-state">No upcoming events in the next 7 days 🎉</div>';return;}
  const nh=JSON.stringify(ev.map(r=>r.Date+r.Title));if(el.dataset.hash===nh)return;el.dataset.hash=nh;
  const g=document.createElement('div');g.className='cards-grid';
  ev.forEach((r,i)=>{
    const auto=getAutoStatus(r),done=auto==='done',cd=getCD(r.Date),urgent=isUrgent(r.Date),hasMat=r.Material&&r.Material.startsWith('http');
    const div=document.createElement('div');div.className='card'+(done?' card-done':'');div.style.animationDelay=(i*0.06)+'s';
    const cdHtml=done?`<div class="countdown cd-done">✓ Completed</div>`:cd?`<div class="countdown${urgent?' cd-urgent':''}" data-date="${r.Date}">⏱ ${cd}</div>`:`<div class="countdown">⏱ Starting soon</div>`;
    div.innerHTML=`<span class="card-type ${tc(r.Type)}">${r.Type||'Event'}</span>${done?'<span class="done-label">✓ Completed</span>':''}<div class="card-title">${r.Title||'Untitled'}</div><div class="card-meta">${[r.Course,r.Section].filter(Boolean).join(' · ')||'—'}</div>${r.Teacher?`<div class="card-teacher">${teacherPill(r.Teacher)}</div>`:''}<div class="card-date">📅 ${fd(r.Date)||'Date not fixed'}</div>${cdHtml}${hasMat?`<a class="btn-view" href="${r.Material}" target="_blank" rel="noopener">↗ View Material</a>`:''}`;
    g.appendChild(div);
  });
  el.innerHTML='';el.appendChild(g);
  if(cdTimer)clearInterval(cdTimer);
  cdTimer=setInterval(()=>{document.querySelectorAll('.countdown[data-date]').forEach(e=>{const v=getCD(e.dataset.date);if(!v){e.innerHTML='⏱ Starting soon';e.classList.remove('cd-urgent');}else{e.innerHTML='⏱ '+v;e.classList.toggle('cd-urgent',isUrgent(e.dataset.date));}});},30000);
}

function buildFilters(d){const types=[...new Set(d.map(r=>r.Type).filter(Boolean))];const bar=document.getElementById('fbar');const ex=[...bar.querySelectorAll('.filter-btn')].map(b=>b.dataset.f);types.forEach(t=>{if(ex.includes(t))return;const b=document.createElement('button');b.className='filter-btn';b.dataset.f=t;b.textContent=t;b.onclick=()=>setF(t);bar.insertBefore(b,bar.querySelector('.search'));});}

function buildTable(d){
  const scrollY=window.scrollY;
  let rows=[...d];
  if(af!=='all')rows=rows.filter(r=>r.Type===af);
  if(sq)rows=rows.filter(r=>Object.values(r).some(v=>v.toLowerCase().includes(sq)));
  const {upcoming,tbd,done}=sortData(rows);
  const tb=document.getElementById('tbody');
  const nh=JSON.stringify([...upcoming,...tbd,...done].map(r=>r.Date+r.Title+getAutoStatus(r)));
  if(tb.dataset.hash===nh)return;tb.dataset.hash=nh;
  if(!upcoming.length&&!tbd.length&&!done.length){tb.innerHTML=`<tr><td colspan="8" style="text-align:center;color:var(--text2);padding:2.5rem">No results found</td></tr>`;return;}
  let html='',delay=0;
  function rowHtml(r){const auto=getAutoStatus(r),dc=r.Date?fd(r.Date)||r.Date:`<span class="date-empty">Not fixed yet</span>`,hasMat=r.Material&&r.Material.startsWith('http');delay+=0.018;return`<tr class="${auto==='done'?'tr-done':''}" style="animation-delay:${delay.toFixed(3)}s"><td>${r.Course||'—'}</td><td>${r.Section||'—'}</td><td><span class="badge ${tc(r.Type)}">${r.Type||'—'}</span></td><td style="max-width:200px"><span class="badge-title">${r.Title||'—'}</span></td><td>${r.Teacher?teacherPill(r.Teacher):'<span style="color:var(--text3);font-size:0.74rem">—</span>'}</td><td style="white-space:nowrap">${dc}</td><td><span class="badge ${sc(auto)}">${statusLabel(auto)}</span></td><td>${hasMat?`<a class="btn-view" href="${r.Material}" target="_blank" rel="noopener">↗ View</a>`:'<span style="color:var(--text3);font-size:0.74rem">—</span>'}</td></tr>`;}
  if(upcoming.length){html+=`<tr class="group-row g-upcoming"><td colspan="8">▲ Upcoming Events (${upcoming.length})</td></tr>`;upcoming.forEach(r=>{html+=rowHtml(r);});}
  if(tbd.length){html+=`<tr class="group-row g-tbd"><td colspan="8">◌ To Be Decided (${tbd.length})</td></tr>`;tbd.forEach(r=>{html+=rowHtml(r);});}
  if(done.length){html+=`<tr class="group-row g-done"><td colspan="8">✓ Completed (${done.length})</td></tr>`;done.forEach(r=>{html+=rowHtml(r);});}
  tb.innerHTML=html;window.scrollTo({top:scrollY,behavior:'instant'});
}

function setF(f){af=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.f===f));buildTable(allData);}
function onSearch(v){sq=v.toLowerCase();buildTable(allData);}

function saveCache(data){try{localStorage.setItem(CACHE_KEY,JSON.stringify(data));}catch(e){}}
function loadCache(){try{const v=localStorage.getItem(CACHE_KEY);return v?JSON.parse(v):null;}catch(e){return null;}}

async function fetchWithTimeout(url,ms=4000){const ctrl=new AbortController();const tid=setTimeout(()=>ctrl.abort(),ms);try{const r=await fetch(url,{cache:'no-store',signal:ctrl.signal});clearTimeout(tid);return r;}catch(e){clearTimeout(tid);throw e;}}

async function fetchData(){
  const dot=document.getElementById('sdot'),stxt=document.getElementById('stxt');
  dot.className='sdot loading';stxt.textContent='Fetching…';
  const url=SHEET+'&t='+Date.now();let lastErr='';
  for(let i=0;i<PROXIES.length;i++){try{const res=await fetchWithTimeout(PROXIES[i](url),4000);if(!res.ok)throw new Error('HTTP '+res.status);const txt=await res.text();if(!txt||txt.length<30)throw new Error('Empty');if(txt.trim().startsWith('<'))throw new Error('Got HTML');const parsed=parseCSV(txt);if(!parsed.length)throw new Error('No rows');allData=parsed;saveCache(allData);document.getElementById('errbox').style.display='none';renderAll(allData);dot.className='sdot';stxt.textContent='Live';document.getElementById('lupd').textContent='Updated '+new Date().toLocaleTimeString();return;}catch(e){lastErr=e.message;}}
  dot.className='sdot err';
  if(allData.length){stxt.textContent='Cached data';renderAll(allData);}else{const c=loadCache();if(c&&c.length){allData=c;stxt.textContent='Offline cache';renderAll(allData);}else{stxt.textContent='Connection failed';document.getElementById('tbody').innerHTML=`<tr><td colspan="8" style="text-align:center;color:var(--red);padding:2rem">Failed to load. Check connection.</td></tr>`;}}
}

function renderAll(data){updateStats(data);buildUpcoming(data);buildFilters(data);buildTable(data);}

(function init(){
  const c=loadCache();
  if(c&&c.length){allData=c;document.getElementById('sdot').className='sdot loading';document.getElementById('stxt').textContent='Loading cached…';renderAll(allData);}
  fetchData();setInterval(fetchData,30000);
})();
</script>
