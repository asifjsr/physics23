<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHYSICS 23 — CT Tracker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0f;--bg2:#13131a;--bg3:#1a1a24;
  --border:#2a2a3d;--border2:#3a3a55;
  --text:#e8e8f0;--text2:#9090b0;
  --accent:#7c6af7;--blue:#4f8ef7;--green:#4fd17a;--amber:#f7c44f;--red:#f74f4f;
  --radius:12px;--radius-sm:8px;
}
html{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
body{max-width:1200px;margin:0 auto;padding:2rem 1.5rem 4rem}

/* HEADER */
.header{text-align:center;padding:3.5rem 1rem 2.5rem;position:relative}
.header-glow{position:absolute;top:0;left:50%;transform:translateX(-50%);width:600px;height:300px;background:radial-gradient(ellipse at center,rgba(124,106,247,0.18) 0%,rgba(79,142,247,0.1) 40%,transparent 70%);pointer-events:none}
.header h1{font-size:clamp(2.2rem,5vw,3.5rem);font-weight:700;letter-spacing:-0.02em;background:linear-gradient(135deg,#fff 30%,#a89aff 70%,#7c6af7 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;position:relative}
.header p{color:var(--text2);font-size:1.05rem;letter-spacing:0.12em;text-transform:uppercase;margin-top:0.4rem;position:relative}
.header-line{width:60px;height:2px;background:linear-gradient(90deg,var(--accent),var(--blue));margin:1.2rem auto 0;border-radius:2px}

/* STATUS */
.status-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.65rem 1rem;margin-bottom:1.5rem;font-size:0.8rem;color:var(--text2)}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-right:6px;animation:pulse 2s infinite}
.sdot.err{background:var(--red);animation:none}
.sdot.loading{background:var(--amber)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* STAT CARDS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem}
@media(max-width:640px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.3rem 1rem;text-align:center;transition:border-color 0.2s,transform 0.2s;cursor:default}
.stat-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.stat-num{font-size:2.2rem;font-weight:700;line-height:1;margin-bottom:0.4rem;font-variant-numeric:tabular-nums}
.stat-label{font-size:0.68rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text2)}
.sn-purple{color:var(--accent)}
.sn-blue{color:var(--blue)}
.sn-green{color:var(--green)}
.sn-amber{color:var(--amber)}

/* SECTION TITLE */
.section-title{font-size:0.72rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text2);margin-bottom:1rem}

/* CARDS */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1rem;margin-bottom:2.5rem}
.card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem 1.3rem;transition:border-color 0.2s,transform 0.2s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--blue));opacity:0;transition:opacity 0.2s}
.card:hover{border-color:var(--border2);transform:translateY(-2px)}
.card:hover::before{opacity:1}
.card-type{font-size:0.68rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:2px 8px;border-radius:4px;display:inline-block;margin-bottom:0.7rem}
.tc{background:rgba(124,106,247,0.15);color:#a89aff}
.th{background:rgba(79,142,247,0.15);color:#7ab4ff}
.tq{background:rgba(247,196,79,0.15);color:#fdd87a}
.te{background:rgba(247,79,79,0.15);color:#ff8a8a}
.to{background:rgba(144,144,176,0.15);color:var(--text2)}
.card-title{font-size:1rem;font-weight:600;margin-bottom:0.3rem;line-height:1.3}
.card-meta{font-size:0.78rem;color:var(--text2);margin-bottom:0.8rem}
.card-date{font-size:0.78rem;color:var(--text2);margin-bottom:0.6rem}
.countdown{background:rgba(124,106,247,0.08);border:1px solid rgba(124,106,247,0.2);border-radius:var(--radius-sm);padding:0.5rem 0.7rem;font-family:ui-monospace,monospace;font-size:0.82rem;color:var(--accent);letter-spacing:0.04em;margin-bottom:0.7rem}
.btn-view{display:inline-flex;align-items:center;gap:5px;background:rgba(79,142,247,0.1);border:1px solid rgba(79,142,247,0.25);color:#7ab4ff;font-size:0.75rem;font-weight:500;padding:4px 10px;border-radius:6px;text-decoration:none;transition:background 0.15s;cursor:pointer}
.btn-view:hover{background:rgba(79,142,247,0.2)}
.empty-state{text-align:center;color:var(--text2);font-size:0.88rem;padding:2rem;background:var(--bg2);border:1px dashed var(--border);border-radius:var(--radius);margin-bottom:2rem}

/* TABLE */
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);margin-bottom:2.5rem}
table{width:100%;border-collapse:collapse;font-size:0.82rem;min-width:640px}
thead tr{background:var(--bg3)}
th{padding:0.75rem 1rem;text-align:left;font-size:0.68rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text2);border-bottom:1px solid var(--border)}
td{padding:0.7rem 1rem;border-bottom:1px solid rgba(42,42,61,0.5);color:var(--text);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(255,255,255,0.02)}
.badge{font-size:0.67rem;font-weight:600;letter-spacing:0.07em;padding:2px 7px;border-radius:4px;text-transform:uppercase}
.sd{background:rgba(79,209,122,0.12);color:#6ee89a}
.su{background:rgba(124,106,247,0.12);color:#a89aff}
.sp{background:rgba(247,196,79,0.12);color:#fdd87a}
.sx{background:rgba(144,144,176,0.1);color:var(--text2)}
.date-empty{color:var(--text2);font-style:italic;font-size:0.76rem}

/* FILTERS */
.filters{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.filter-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text2);font-size:0.73rem;padding:4px 12px;border-radius:20px;cursor:pointer;transition:all 0.15s}
.filter-btn:hover,.filter-btn.active{background:rgba(124,106,247,0.15);border-color:rgba(124,106,247,0.35);color:var(--accent)}
.search{background:var(--bg2);border:1px solid var(--border);color:var(--text);font-size:0.8rem;padding:5px 12px;border-radius:20px;outline:none;margin-left:auto;min-width:160px;transition:border-color 0.15s}
.search:focus{border-color:rgba(124,106,247,0.4)}
.search::placeholder{color:var(--text2)}

/* LOADING / ERROR */
.loading-row td{text-align:center;padding:2.5rem;color:var(--text2)}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.err-box{background:rgba(247,79,79,0.07);border:1px solid rgba(247,79,79,0.22);border-radius:var(--radius-sm);padding:0.9rem 1.1rem;margin-bottom:1.2rem;color:#ff9a9a;font-size:0.82rem;line-height:1.6;display:none}

@media(max-width:600px){
  body{padding:1rem 0.75rem 3rem}
  .header{padding:2rem 0.5rem 1.5rem}
  .header-glow{width:100%}
  .filters{gap:0.4rem}
  .search{margin-left:0;width:100%}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-glow"></div>
  <h1>PHYSICS 23</h1>
  <p>CT Tracker</p>
  <div class="header-line"></div>
</div>

<div class="status-bar">
  <span><span class="sdot loading" id="sdot"></span><span id="stxt">Connecting…</span></span>
  <span id="lupd"></span>
</div>

<!-- STAT CARDS -->
<div class="stats">
  <div class="stat-card">
    <div class="stat-num sn-purple" id="s-total">—</div>
    <div class="stat-label">Total</div>
  </div>
  <div class="stat-card">
    <div class="stat-num sn-blue" id="s-upcoming">—</div>
    <div class="stat-label">Upcoming</div>
  </div>
  <div class="stat-card">
    <div class="stat-num sn-green" id="s-done">—</div>
    <div class="stat-label">Done</div>
  </div>
  <div class="stat-card">
    <div class="stat-num sn-amber" id="s-week">—</div>
    <div class="stat-label">This Week</div>
  </div>
</div>

<div class="err-box" id="errbox"></div>

<p class="section-title">Upcoming This Week</p>
<div id="upcoming"><div style="padding:1.5rem 0;color:var(--text2);font-size:0.85rem"><span class="spinner"></span>Loading…</div></div>

<p class="section-title">All Class Tests &amp; Activities</p>
<div class="filters" id="fbar">
  <button class="filter-btn active" data-f="all" onclick="setF('all')">All</button>
  <input type="text" class="search" placeholder="Search…" oninput="onSearch(this.value)">
</div>
<div class="table-wrap">
  <table>
    <thead><tr><th>Course</th><th>Section</th><th>Type</th><th>Title</th><th>Date</th><th>Status</th><th>Material</th></tr></thead>
    <tbody id="tbody"><tr class="loading-row"><td colspan="7"><span class="spinner"></span>Fetching data…</td></tr></tbody>
  </table>
</div>

<script>
const SHEET = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSNw54kYiLKI2oL65tXLZqxdUwgc39ATSaNdAuVG1x0JqzNZcWZDdpfFA8lBPeitQVmtaiRiygvT7PS/pub?gid=54829023&single=true&output=csv';

// Multiple proxy fallbacks
const PROXIES = [
  u => 'https://corsproxy.io/?' + encodeURIComponent(u),
  u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
  u => 'https://thingproxy.freeboard.io/fetch/' + u,
];

let allData=[], af='all', sq='', cdTimer=null, proxyIdx=0;

function splitLine(l){
  const r=[]; let c='',q=false;
  for(let i=0;i<l.length;i++){
    if(l[i]==='"'){q=!q}
    else if(l[i]===','&&!q){r.push(c);c='';}
    else c+=l[i];
  }
  r.push(c);
  return r.map(x=>x.replace(/^"|"$/g,'').trim());
}

function parseCSV(txt){
  const lines=txt.trim().split(/\r?\n/);
  if(lines.length<2)return[];
  const h=splitLine(lines[0]).map(x=>x.trim());
  return lines.slice(1).map(l=>{
    const cols=splitLine(l),o={};
    h.forEach((k,i)=>{o[k]=(cols[i]||'').trim();});
    return o;
  }).filter(r=>Object.values(r).some(v=>v));
}

function pd(s){if(!s)return null;const d=new Date(s);return isNaN(d)?null:d;}
function fd(s){const d=pd(s);return d?d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'}):null;}
function getCD(s){
  const d=pd(s);if(!d)return null;
  const diff=d-new Date();if(diff<0)return null;
  return Math.floor(diff/86400000)+'d '+Math.floor(diff%86400000/3600000)+'h '+Math.floor(diff%3600000/60000)+'m';
}
function inWeek(s){const d=pd(s);if(!d)return false;const diff=d-new Date();return diff>=0&&diff<=604800000;}
function tc(t){if(!t)return'to';const s=t.toLowerCase();if(s.includes('ct')||s.includes('class test'))return'tc';if(s.includes('hw')||s.includes('home'))return'th';if(s.includes('quiz'))return'tq';if(s.includes('exam')||s.includes('final'))return'te';return'to';}
function sc(s){if(!s)return'sx';const v=s.toLowerCase();if(v.includes('done')||v.includes('complet')||v.includes('pass'))return'sd';if(v.includes('upcoming')||v.includes('soon')||v.includes('schedul'))return'su';if(v.includes('pending')||v.includes('due'))return'sp';return'sx';}

function updateStats(d){
  const total=d.length;
  const done=d.filter(r=>sc(r.Status)==='sd').length;
  const upcoming=d.filter(r=>{const date=pd(r.Date);return date&&date>new Date()&&sc(r.Status)!=='sd';}).length;
  const week=d.filter(r=>inWeek(r.Date)).length;
  // Animate count up
  animateCount('s-total',total);
  animateCount('s-upcoming',upcoming);
  animateCount('s-done',done);
  animateCount('s-week',week);
}

function animateCount(id,target){
  const el=document.getElementById(id);
  const current=parseInt(el.textContent)||0;
  if(current===target){return;}
  const step=Math.ceil(Math.abs(target-current)/12);
  let val=current;
  const interval=setInterval(()=>{
    val=val<target?Math.min(val+step,target):Math.max(val-step,target);
    el.textContent=val;
    if(val===target)clearInterval(interval);
  },40);
}

function buildUpcoming(d){
  const el=document.getElementById('upcoming');
  const ev=d.filter(r=>inWeek(r.Date)).sort((a,b)=>new Date(a.Date)-new Date(b.Date));
  if(!ev.length){el.innerHTML='<div class="empty-state">No upcoming events in the next 7 days 🎉</div>';return;}
  const g=document.createElement('div');g.className='cards-grid';
  ev.forEach(r=>{
    const hasMat=r.Material&&r.Material.startsWith('http');
    const div=document.createElement('div');div.className='card';
    div.innerHTML=`
      <span class="card-type ${tc(r.Type)}">${r.Type||'Event'}</span>
      <div class="card-title">${r.Title||'Untitled'}</div>
      <div class="card-meta">${[r.Course,r.Section].filter(Boolean).join(' · ')||'—'}</div>
      <div class="card-date">📅 ${fd(r.Date)||'Date not fixed'}</div>
      <div class="countdown" data-date="${r.Date}">⏱ ${getCD(r.Date)||'Starting soon'}</div>
      ${hasMat?`<a class="btn-view" href="${r.Material}" target="_blank" rel="noopener">↗ View Material</a>`:''}
    `;
    g.appendChild(div);
  });
  el.innerHTML='';el.appendChild(g);
  if(cdTimer)clearInterval(cdTimer);
  cdTimer=setInterval(()=>{
    document.querySelectorAll('.countdown[data-date]').forEach(e=>{
      const v=getCD(e.dataset.date);e.textContent=v?'⏱ '+v:'⏱ Starting soon';
    });
  },30000);
}

function buildFilters(d){
  const types=[...new Set(d.map(r=>r.Type).filter(Boolean))];
  const bar=document.getElementById('fbar');
  const ex=[...bar.querySelectorAll('.filter-btn')].map(b=>b.dataset.f);
  types.forEach(t=>{
    if(ex.includes(t))return;
    const b=document.createElement('button');
    b.className='filter-btn';b.dataset.f=t;b.textContent=t;
    b.onclick=()=>setF(t);
    bar.insertBefore(b,bar.querySelector('.search'));
  });
}

function buildTable(d){
  let rows=[...d];
  if(af!=='all')rows=rows.filter(r=>r.Type===af);
  if(sq)rows=rows.filter(r=>Object.values(r).some(v=>v.toLowerCase().includes(sq)));
  rows.sort((a,b)=>{const da=pd(a.Date),db=pd(b.Date);if(da&&db)return da-db;return da?-1:db?1:0;});
  const tb=document.getElementById('tbody');
  if(!rows.length){tb.innerHTML=`<tr><td colspan="7" style="text-align:center;color:var(--text2);padding:2rem">No results found</td></tr>`;return;}
  tb.innerHTML=rows.map(r=>{
    const dateCell=r.Date?fd(r.Date)||r.Date:`<span class="date-empty">Not fixed yet</span>`;
    const hasMat=r.Material&&r.Material.startsWith('http');
    return`<tr>
      <td>${r.Course||'—'}</td>
      <td>${r.Section||'—'}</td>
      <td><span class="badge ${tc(r.Type)}">${r.Type||'—'}</span></td>
      <td style="max-width:220px">${r.Title||'—'}</td>
      <td>${dateCell}</td>
      <td><span class="badge ${sc(r.Status)}">${r.Status||'—'}</span></td>
      <td>${hasMat?`<a class="btn-view" href="${r.Material}" target="_blank" rel="noopener">↗ View</a>`:'<span style="color:var(--text2);font-size:0.75rem">—</span>'}</td>
    </tr>`;
  }).join('');
}

function setF(f){
  af=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.f===f));
  buildTable(allData);
}
function onSearch(v){sq=v.toLowerCase();buildTable(allData);}

async function tryFetch(){
  const url=PROXIES[proxyIdx](SHEET);
  const res=await fetch(url,{cache:'no-store'});
  if(!res.ok)throw new Error('HTTP '+res.status);
  const txt=await res.text();
  if(!txt||txt.length<30)throw new Error('Empty response');
  // Check if it's actually CSV (not an error HTML page)
  if(txt.trim().startsWith('<'))throw new Error('Got HTML instead of CSV');
  return txt;
}

async function fetchData(){
  const dot=document.getElementById('sdot');
  const stxt=document.getElementById('stxt');

  try{
    dot.className='sdot loading';
    stxt.textContent='Fetching…';

    const res = await fetch(SHEET + "&t=" + Date.now(), {
      cache: "no-store"
    });

    if(!res.ok) throw new Error("Network error");

    const txt = await res.text();

    if(!txt || txt.length < 20){
      throw new Error("Empty data");
    }

    const parsed = parseCSV(txt);

    if(!parsed.length){
      throw new Error("No rows found");
    }

    allData = parsed;

    document.getElementById('errbox').style.display='none';

    updateStats(allData);
    buildUpcoming(allData);
    buildFilters(allData);
    buildTable(allData);

    dot.className='sdot';
    stxt.textContent='Live — updates';

    document.getElementById('lupd').textContent =
      'Updated ' + new Date().toLocaleTimeString();

  } catch(e){

    dot.className='sdot err';
    stxt.textContent='Retrying…';

    // ❗ IMPORTANT: old data keep
    if(allData.length){
      updateStats(allData);
      buildUpcoming(allData);
      buildTable(allData);
    }

    console.warn("Fetch error:", e.message);
  }
}
fetchData();
setInterval(fetchData,7000);
</script>
</body>
</html>
